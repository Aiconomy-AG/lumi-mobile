site_name: Lumi Mobile Maintainer Documentation
site_description: Maintainer documentation for the Lumi Kotlin Multiplatform mobile application.
site_url: https://Aiconomy-AG.github.io/lumi-mobile/
repo_url: https://github.com/Aiconomy-AG/lumi-mobile
repo_name: Aiconomy-AG/lumi-mobile
strict: true

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: slate
      primary: deep purple
      accent: deep purple

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Local setup: setup.md
  - Architecture:
      - Application architecture: architecture/overview.md
      - Routing and navigation: architecture/routing.md
      - Authentication and sessions: architecture/authentication.md
      - State, caching, and persistence: architecture/state.md
      - API and data contracts: architecture/api.md
      - Real-time, notifications, and integrations: architecture/realtime-notifications.md
  - Modules:
      - Feature modules: modules/features.md
      - Components, utilities, and providers: modules/components-utilities.md
      - Forms, validation, localization, and accessibility: modules/forms-localization-accessibility.md
  - Maintenance:
      - Testing, builds, and deployment: maintenance/testing-builds-deployment.md
      - Workflows and state transitions: maintenance/workflows.md
      - Technical debt and operational risks: maintenance/technical-debt-risks.md

